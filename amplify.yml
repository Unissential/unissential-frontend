version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - npm ci
        - echo "Running linter..."
        - npm run lint
        - echo "Type checking..."
        - npx tsc --noEmit
    build:
      commands:
        - echo "Building Next.js application..."
        - npm run build
        - echo "Build completed successfully!"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'
      - '.next/cache/**/*'
  logs:
    # Enable detailed build logs
    retention: 24 # hours

# Environment setup per deployment
deployment:
  # Staging environment
  staging:
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Staging environment setup"
    buildSpec: amplify.yml
    description: Staging deployment

  # Production environment
  production:
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Production environment setup"
            - npm run build:analyze  # Optional: analyze bundle
    buildSpec: amplify.yml
    description: Production deployment

# Custom redirects for SPA
customRules:
  # Redirect all routes to index for SPA routing
  - source: '/<*>'
    target: '/index.html'
    status: '404-200'
    condition: 'if file does not exist'
  # Enable SPA routing
  - source: '</^((?!\.(js|css|gif|jpg|jpeg|png|txt|svg|swf|eot|ttf|woff|woff2|otf)$).)*$>'
    target: '/index.html'
    status: '200'
